name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/backend.yml"
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}
      GROQ_API_KEY: test-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio flake8

      - name: Compile backend
        run: python -m compileall backend

      - name: Import smoke test
        run: python -c "from backend.main import app; print(app.title)"

      - name: Lint backend
        run: flake8 backend tests --max-line-length=100 --extend-exclude=venv,.venv,node_modules,.next

      - name: Run backend tests
        run: pytest -v
