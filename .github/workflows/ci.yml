name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile langgraph_backend.py
          python -m py_compile streamlit_frontend.py
          python -m py_compile observability/logging_config.py

      - name: Check imports
        run: |
          python -c "from langgraph_backend import chatbot, ingest_pdf"
          python -c "from streamlit_frontend import *"
          python -c "from observability.logging_config import get_logger, configure_logging"

      - name: Run Streamlit doctor
        run: |
          pip install streamlit
          streamlit --version
