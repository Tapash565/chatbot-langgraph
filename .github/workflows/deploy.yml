name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-streamlit:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Streamlit runs
        run: |
          timeout 10 streamlit run streamlit_frontend.py --server.headless true || true

      - name: Deploy to Streamlit Cloud
        if: github.repository == 'your-username/langgraph_chatbot'  # Update with your repo
        uses: streamlit/streamlit-deploy-action@v1
        with:
          email: ${{ secrets.STREAMLIT_EMAIL }}
          password: ${{ secrets.STREAMLIT_PASSWORD }}
          app-path: streamlit_frontend.py
