[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.flake8]
max-line-length = 100
exclude = [".git", "__pycache__", "venv", ".venv", "faiss_indices"]

[tool.bandit]
exclude_dirs = ["tests", ".git"]
severity = "medium"
